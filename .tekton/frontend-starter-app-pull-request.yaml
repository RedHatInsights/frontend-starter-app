apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/RedHatInsights/frontend-starter-app?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && target_branch
      == "master"
    pipelinesascode.tekton.dev/pipeline: https://raw.githubusercontent.com/catastrophe-brandon/konflux-pipelines/refs/heads/btweed/platform-ui-v2-flexible-secrets/pipelines/platform-ui/docker-build-run-all-tests-v2.yaml
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: frontend-starter-app
    appstudio.openshift.io/component: frontend-starter-app
    pipelines.appstudio.openshift.io/type: build
  name: frontend-starter-app-on-pull-request
  namespace: rh-platform-experien-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/redhat-user-workloads/rh-platform-experien-tenant/frontend-starter-app/frontend-starter-app:on-pr-{{revision}}
  - name: image-expires-after
    value: 5d
  - name: dockerfile
    value: build-tools/Dockerfile
  - name: path-context
    value: .
  - name: rebuild
    value: "true"
  - name: e2e-app-port
    value: "8000"
  - name: e2e-playwright-image
    value: mcr.microsoft.com/playwright:v1.59.1-noble
  - name: workspace-setup-script
    value: |
      #!/bin/bash
      set -ex

      npm install
  - name: unit-tests-script
    value: |
      #!/bin/bash
      set -ex

      npm run lint
      npm test -- --runInBand --no-cache
  - name: run-app-script
    value: |
      #!/bin/sh
      # Script that runs the test application with Caddy using ConfigMap-mounted Caddyfile

      set -e

      echo "Starting application with Caddy using ConfigMap Caddyfile..."
      exec caddy run --config /etc/caddy/Caddyfile
  - name: e2e-tests-script
    value: |
      #!/bin/bash
      set -ex

      echo "E2E_USER is ${E2E_USER}"
      getent hosts stage.foo.redhat.com
      timeout 120s bash -c 'until curl -k https://stage.foo.redhat.com:1337 > /dev/null 2>&1; do
        echo "Waiting for dev server to be ready"
        sleep 5
      done'
      echo "Dev server ready!"

      echo "=== Dumping full environment ==="
      env | sort
      echo "=== End environment dump ==="

      echo "Checking for required Currents environment variables..."
      if [ -z "$CURRENTS_RECORD_KEY" ]; then
        echo "ERROR: CURRENTS_RECORD_KEY is not set"
        exit 1
      fi
      echo "CURRENTS_RECORD_KEY is set"

      echo "Running Playwright tests with Currents reporting..."
      export CURRENTS_PROJECT_ID=wzCT4R
      export CURRENTS_CI_BUILD_ID="${PIPELINE_RUN_NAME:-$RANDOM}"
      export CURRENTS_TAG="pr-{{pull_request_number}}"
      npx playwright test
  - name: e2e-credentials-secret
    value: frontend-starter-app-credentials-secret
  - name: frontend-proxy-routes-configmap
    value: frontend-starter-app-dev-proxy-caddyfile-v2
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/catastrophe-brandon/konflux-pipelines
    - name: revision
      value: btweed/platform-ui-v2-flexible-secrets
    - name: pathInRepo
      value: pipelines/platform-ui/docker-build-run-all-tests-v2.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-frontend-starter-app
  taskRunSpecs:
    - pipelineTaskName: run-e2e-tests
      serviceAccountName: build-pipeline-frontend-starter-app
      stepSpecs:
        - name: e2e-tests
          env:
            - name: CURRENTS_RECORD_KEY
              valueFrom:
                secretKeyRef:
                  name: frontend-starter-app-credentials-secret
                  key: currents-record-key
      podTemplate:
        # Override /etc/hosts to redirect stage.foo.redhat.com to localhost
        hostAliases:
          - ip: "::1"
            hostnames:
              - "stage.foo.redhat.com"
          - ip: "127.0.0.1"
            hostnames:
              - "stage.foo.redhat.com"
  workspaces:
  - name: workspace
    volumeClaimTemplate:
      metadata:
        creationTimestamp: null
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 3Gi
      status: {}
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
